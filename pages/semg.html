<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VAAKYA – Live sEMG Signal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/semg.css"/>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="nav-left">
      <div class="nav-brand">
        <div class="nav-brand-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm-1 13H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <span class="nav-brand-name">VAAKYA</span>
      </div>
      <button class="back-btn" onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back to Dashboard
      </button>
    </div>
    <div class="nav-right">
      <div class="ws-status" id="wsStatus">
        <div class="ws-dot" id="wsDot"></div>
        <span id="wsLabel">Connecting…</span>
      </div>
      <div class="nav-avatar">ST</div>
    </div>
  </nav>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-pill">
      <span class="stat-label">Speech Bursts</span>
      <span class="stat-value" id="statBursts">0</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">Current RMS</span>
      <span class="stat-value" id="statRms">—</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">Activation</span>
      <span class="stat-value" id="statNorm">—</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">Status</span>
      <span class="stat-value" id="statSpeech">Silence</span>
    </div>
    <div class="stat-pill">
      <span class="stat-label">Strain</span>
      <span class="stat-value" id="statStrain">—</span>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-wrap">

    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">
          <span class="chart-dot dot-blue"></span>
          sEMG RMS Signal
        </div>
        <div class="chart-legend">
          <span class="legend-item"><span class="legend-dot" style="background:#00cfff"></span>Raw RMS</span>
          <span class="legend-item"><span class="legend-dot" style="background:#ff9f40"></span>Smoothed</span>
          <span class="legend-item"><span class="legend-dot" style="background:#ff4444;"></span>Onset threshold</span>
        </div>
      </div>
      <div class="chart-body">
        <canvas id="rmsChart"></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">
          <span class="chart-dot dot-green"></span>
          Muscle Activation (Normalised 0–1)
        </div>
        <div class="chart-legend">
          <span class="legend-item"><span class="legend-dot" style="background:#7fff00"></span>Activation</span>
          <span class="legend-item"><span class="legend-dot" style="background:#ff4444"></span>Detection threshold</span>
        </div>
      </div>
      <div class="chart-body">
        <canvas id="normChart"></canvas>
      </div>
    </div>

  </div>

  <!-- SPEECH EVENT LOG -->
  <div class="event-log-wrap">
    <div class="event-log-header">Speech Event Log</div>
    <div class="event-log" id="eventLog">
      <div class="event-empty">Waiting for speech events…</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="../js/semg.js"></script>
</body>
</html>
